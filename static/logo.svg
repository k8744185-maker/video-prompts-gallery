<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Circular background -->
  <circle cx="96" cy="96" r="96" fill="url(#g)"/>
  <!-- Film clapperboard body -->
  <rect x="44" y="72" width="104" height="76" rx="8" fill="white" opacity="0.95"/>
  <!-- Clapper strips -->
  <rect x="44" y="62" width="104" height="18" rx="4" fill="white" opacity="0.85"/>
  <!-- Diagonal stripe on clapper -->
  <line x1="66" y1="62" x2="58" y2="80" stroke="#667eea" stroke-width="6"/>
  <line x1="86" y1="62" x2="78" y2="80" stroke="#667eea" stroke-width="6"/>
  <line x1="106" y1="62" x2="98" y2="80" stroke="#667eea" stroke-width="6"/>
  <line x1="126" y1="62" x2="118" y2="80" stroke="#667eea" stroke-width="6"/>
  <!-- V letter -->
  <text x="96" y="130" font-family="Arial Black,Arial,sans-serif" font-size="36"
        font-weight="900" fill="#667eea" text-anchor="middle">VPG</text>
</svg>
